<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('./coffee.jpg') ;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: rgba(116, 106, 106, 0.281);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }
        .signup-only {
            display: none;
        }
        .form-container h3 {
            text-align: center;
            color: #fff;
            margin-bottom: 20px;
        }
        .btn-primary {
            border: none;
            background-color: transparent;
        }
        .switch-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="form-container shadow">
        <h3 id="form-title">Sign In</h3>
        <form id="auth-form">
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="email" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="password" required>
            </div>
            <div class="mb-3 signup-only">
                <input type="password" class="form-control" id="confirm-password" placeholder="Confirm password">
            </div>
            <button type="submit" class="btn btn-primary w-100 shadow" id="submit-btn">Sign In</button>
        </form>
        <div class="switch-text">
            <small id="switch-prompt">Don't have an account?</small>
            <a href="#" id="switch-link">Sign Up</a>
        </div>
    </div>

    <script>
        const switchLink = document.getElementById('switch-link');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const switchPrompt = document.getElementById('switch-prompt');
        const signupOnlyFields = document.querySelectorAll('.signup-only');
        let isSignUp = false;
        switchLink.addEventListener('click', function(event) {
            event.preventDefault();
            isSignUp = !isSignUp;
            formTitle.textContent = isSignUp ? 'Sign Up' : 'Sign In';
            submitBtn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
            switchPrompt.textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
            switchLink.textContent = isSignUp ? 'Sign In' : 'Sign Up';
            signupOnlyFields.forEach(field => {
                field.style.display = isSignUp ? 'block' : 'none';
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
