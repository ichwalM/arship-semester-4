<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wajah Panda</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .panda {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 300px;
            height: 300px;
            background-color: white;
            border-radius: 50%;
            border: 5px solid black;
        }
        .ears {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: -50px;
            width: 100%;
        }
        .ear {
            width: 100px;
            height: 100px;
            background-color: black;
            border-radius: 50%;
        }
        .eyes {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            width: 80%;
        }
        .eye {
            width: 60px;
            height: 90px;
            background-color: black;
            border-radius: 50%;
        }
        .nose {
            margin-top: 20px;
            width: 30px;
            height: 30px;
            background-color: black;
            border-radius: 50%;
        }
        .mouth {
            margin-top: 20px;
            width: 80px;
            height: 10px;
            background-color: black;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="panda">
        <div class="ears">
            <div class="ear"></div>
            <div class="ear"></div>
        </div>
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="nose"></div>
        <div class="mouth"></div>
    </div>
</body>
</html>
